name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build web
        run: npx expo export --platform web

      - name: Copy index.html to 404.html for SPA routing
        run: cp dist/index.html dist/404.html

      - name: Disable Jekyll
        run: touch dist/.nojekyll

      - name: Build admin tool (manifest + common blocks)
        run: node scripts/build-admin-manifest.js

      - name: Stage admin tool into dist/admin
        run: |
          mkdir -p dist/admin/data
          cp admin-ui.html dist/admin/index.html
          # Copy every data file the admin tool may load. Excludes scripts/ and data_csv/
          # (already filtered by the manifest builder). Use rsync to preserve subdirs.
          rsync -a --exclude='scripts' --exclude='data_csv' data/ dist/admin/data/

      - name: Encrypt admin tool with staticrypt
        env:
          STATICRYPT_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: npx staticrypt dist/admin/index.html -d dist/admin --template-title "EthiopicReader Admin" --template-color-primary "#C9A84C" --template-color-secondary "#0a0a0a" --remember 15 --config false

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
